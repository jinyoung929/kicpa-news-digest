name: Daily CPA News Digest

on:
  schedule:
    # 01:07 UTC ≈ 10:07 KST. GitHub는 정시(분=0) 스케줄은 부하가 몰려 지연·스킵되기 쉽다고
    # 공식적으로 경고하므로, 정시를 피해 몇 분 뒤로 오프셋을 둠.
    - cron: "7 1 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Collect and summarize news
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: npm run collect

      - name: Commit updated data
        id: commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          if git diff --cached --quiet; then
            echo "No data changes to commit."
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            git commit -m "chore: update daily digest data"
            git push
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      # Vercel의 GitHub 자동배포(push 감지)가 github-actions[bot]의 커밋에는
      # 안정적으로 반응하지 않는 경우가 있어, Deploy Hook을 직접 호출해 확실히 트리거함
      - name: Trigger Vercel deploy
        if: steps.commit.outputs.changed == 'true'
        run: curl -fsS -X POST "${{ secrets.VERCEL_DEPLOY_HOOK_URL }}"
